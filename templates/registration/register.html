{% load static %}

<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel ="stylesheet" href="{% static 'main/css/login.css' %}">
    <link rel ="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css">
    <link rel ="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css}">
    <script href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
    <script href="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
    <title>Login</title>
</head>
<body>
<div class="wrapper">
        <div class="logo">
            <img src="{% static 'main/img/baba.jpg' %}" alt="", height="80", width="800">
        </div>
        <div class="text-center mt-4 name">
            SignUp
        </div>
        <form method="post">
            {% csrf_token %}
            <div class="">
                <span class="far fa-user"></span>
                <input type="text" name="username" placeholder="Username">
            </div>
            <div class="form-field d-flex align-items-center">
                <span class="fas fa-key"></span>
                <input type="password" name="password1" placeholder="Password">

                <input type="password" name="password2" placeholder="Password">
            </div>
            {{ form.errors }}
            <button class="btn mt-3">SignUp</button>
        </form>
        <div class="text-center fs-6">
            <a href="{% url 'login' %}">Login</a>
        </div>
    </div>
</div><!-- container -->
</body>
</html>
