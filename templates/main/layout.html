{% load static %}
<html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v7.1.0)/css/all.css">
</head>
<body>
    <aside>
        <img src="{% static 'main/img/baba.jpg' %}" alt="logo" height="80", width="200" />
        <span class="logo"></span>
        <h3>Навигация</h3>
        <ul>
            <a href="index"><li><i class="fa-solid fa-house"></i><i class="fa-solid fa-house"></i>Главная</li></a>
            <a href="ads"><li><i></i>Предложения</li></a>
            <a href="{% url 'login' %}"><li><i>Войти</i></li></a>
            <a href="{% url 'profile' %}"><li><i>Профиль</i></li></a>
            <a href="{% url 'create' %}"><li><i>Создать объявление</i></li></a>
        </ul>
    </aside>
    <main>
        {% block content %}
        {% endblock %}
    </main>
<body>

</html>
